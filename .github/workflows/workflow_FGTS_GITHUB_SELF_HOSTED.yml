name: FGTS - Verificar no GitHub e emitir no PC local

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12-23 * * *"   # 09h às 20h de Brasília, de hora em hora (UTC)

concurrency:
  group: fgts-emissao-diaria
  cancel-in-progress: false

jobs:
  verificar_gatilho:
    runs-on: ubuntu-latest
    outputs:
      emitir: ${{ steps.verificar.outputs.emitir }}
      valor_lido: ${{ steps.verificar.outputs.valor_lido }}
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.FGTS_SPREADSHEET_ID }}
      ABA_PLANILHA: mensagens
      CELULA_STATUS: N3
      STATUS_DISPARO: EMITIR
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Verificar status na planilha
        id: verificar
        run: python script_FGTS_1_GITHUB_V1_.py

      - name: Mostrar resultado
        run: |
          echo "emitir=${{ steps.verificar.outputs.emitir }}"
          echo "valor_lido=${{ steps.verificar.outputs.valor_lido }}"

  emitir_local_pc:
    needs: verificar_gatilho
    if: needs.verificar_gatilho.outputs.emitir == 'true'
    runs-on: [self-hosted, windows, fgts]
    env:
      SCRIPT_LOCAL_FGTS_2: C:\Users\breno\OneDrive\Gestao Financeira SPM\CNDs\FGTS\script_FGTS_2_V1_.py
    steps:
      - name: Mostrar gatilho recebido
        shell: powershell
        run: |
          Write-Host "Recebido gatilho para emissão local."
          Write-Host "Valor lido na planilha: ${{ needs.verificar_gatilho.outputs.valor_lido }}"

      - name: Validar existência do script local
        shell: powershell
        run: |
          if (-not (Test-Path $env:SCRIPT_LOCAL_FGTS_2)) {
            Write-Error "Script local não encontrado: $env:SCRIPT_LOCAL_FGTS_2"
            exit 1
          }

      - name: Rodar emissão local FGTS
        shell: powershell
        run: |
          python "$env:SCRIPT_LOCAL_FGTS_2"
