name: FGTS - Verificar no GitHub e emitir no PC local

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12-23 * * *"

concurrency:
  group: fgts-emissao-diaria
  cancel-in-progress: false

jobs:
  verificar_gatilho:
    runs-on: ubuntu-latest
    outputs:
      emitir: ${{ steps.verificar.outputs.emitir }}
      valor_lido: ${{ steps.verificar.outputs.valor_lido }}
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.FGTS_GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ secrets.FGTS_SPREADSHEET_ID }}
      ABA_PLANILHA: mensagens
      CELULA_STATUS: N3
      STATUS_DISPARO: EMITIR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Verificar planilha
        id: verificar
        run: python script_FGTS_1_GITHUB_V1_.py

      - name: Debug outputs
        run: |
          echo "emitir=${{ steps.verificar.outputs.emitir }}"
          echo "valor_lido=${{ steps.verificar.outputs.valor_lido }}"

  emitir_local_pc:
    needs: verificar_gatilho
    if: needs.verificar_gatilho.outputs.emitir == 'true'
    runs-on: [self-hosted, windows, fgts]
    env:
      SCRIPT_LOCAL_FGTS_2: C:\Users\breno\OneDrive\Gestao Financeira SPM\CNDs\FGTS\script_FGTS_2_V1_.py
    steps:
      - name: Info
        shell: cmd
        run: |
          echo Disparando execucao local FGTS
          echo Valor lido na planilha: ${{ needs.verificar_gatilho.outputs.valor_lido }}

      - name: Validar existencia do script local
        shell: cmd
        run: |
          if not exist "%SCRIPT_LOCAL_FGTS_2%" (
            echo Script local nao encontrado: %SCRIPT_LOCAL_FGTS_2%
            exit /b 1
          )

      - name: Rodar Script Local
        shell: cmd
        run: |
          python "%SCRIPT_LOCAL_FGTS_2%"
